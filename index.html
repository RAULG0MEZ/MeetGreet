<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeetGreet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" fill="#8ab4f8"/>
        <path d="M8 9.5C8 8.67 8.67 8 9.5 8h5C15.33 8 16 8.67 16 9.5v4c0 .55-.3 1.03-.74 1.28L17 16.5V17h-1l-1.5-1.5H9.5C8.67 15.5 8 14.83 8 14V9.5z" fill="#202124"/>
        <path d="M10 11h4M10 13h2" stroke="#8ab4f8" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <span>MeetGreet</span>
    </div>
    <div class="header-center" id="meeting-status">
      <span id="status-dot" class="dot dot-waiting"></span>
      <span id="status-text">Iniciando…</span>
    </div>
    <div class="header-right">
      <span id="clock"></span>
      <button class="icon-btn" id="btn-share-link" title="Compartir enlace">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Banner cuando estás presentando -->
  <div class="share-banner" id="share-banner" style="display:none">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
      <path d="M20 18c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4z"/>
    </svg>
    <span>Estás presentando tu pantalla a todos</span>
    <button id="btn-stop-banner">Detener</button>
  </div>

  <!-- Main area -->
  <div class="app-body">
    <div class="video-area" id="video-area">
      <div class="video-grid" id="video-grid"></div>
    </div>

    <!-- Chat panel -->
    <div class="chat-panel" id="chat-panel">
      <div class="chat-header">
        <span>Chat en la reunión</span>
        <button class="icon-btn" id="btn-close-chat" title="Cerrar chat">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        </button>
      </div>
      <div class="chat-messages" id="chat-messages">
        <div class="chat-empty">Sin mensajes aún.<br>Di hola 👋</div>
      </div>
      <div class="chat-input-row">
        <input id="chat-input" type="text" placeholder="Enviar un mensaje…" maxlength="500" autocomplete="off" />
        <button id="btn-send" title="Enviar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-group">

      <div class="toolbar-item">
        <button class="tbtn" id="btn-mic" title="Silenciar / Activar micrófono">
          <svg class="icon-on" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/>
          </svg>
          <svg class="icon-off" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 11h-1.7c0 .74-.16 1.43-.43 2.05l1.23 1.23c.56-.98.9-2.09.9-3.28zm-4.02.17c0-.06.02-.11.02-.17V5c0-1.66-1.34-3-3-3S9 3.34 9 5v.18l5.98 5.99zM4.27 3L3 4.27l6.01 6.01V11c0 1.66 1.34 3 3 3 .23 0 .44-.03.65-.08l1.66 1.66c-.71.33-1.5.52-2.31.52-2.76 0-5.3-2.1-5.3-5.1H5c0 3.41 2.72 6.23 6 6.72V20c0 .55.45 1 1 1s1-.45 1-1v-2.28c.91-.13 1.77-.45 2.54-.9L19.73 21 21 19.73 4.27 3z"/>
          </svg>
        </button>
        <span class="tbtn-label">Mic</span>
      </div>

      <div class="toolbar-item">
        <button class="tbtn" id="btn-cam" title="Apagar / Encender cámara">
          <svg class="icon-on" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
          </svg>
          <svg class="icon-off" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path d="M21 6.5l-4 4V7c0-.55-.45-1-1-1H9.82L21 17.18V6.5zM3.27 2L2 3.27 4.73 6H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.21 0 .39-.08.54-.18L19.73 21 21 19.73 3.27 2z"/>
          </svg>
        </button>
        <span class="tbtn-label">Cámara</span>
      </div>

      <div class="toolbar-item">
        <button class="tbtn" id="btn-screen" title="Compartir pantalla">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20 18c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6zm8 4.7L9.3 8 8 9.3l4 4 4-4-1.3-1.3L12 10.7z"/>
          </svg>
        </button>
        <span class="tbtn-label">Pantalla</span>
      </div>

      <div class="toolbar-item" id="ctrl-item" style="display:none">
        <button class="tbtn" id="btn-control" title="Tomar / Soltar control remoto">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path d="M4 0h2v2H4V0zm4 0h2v2H8V0zm4 0h2v2h-2V0zM4 4h2v2H4V4zm4 4h2v2H8V8zm6-2h2v2h-2V6zM4 8h2v4H4V8zm4 4h8v2H8v-2zM4 14h16v2H4v-2zm0 4h16v2H4v-2z"/>
            <path d="M13 2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1V3a1 1 0 011-1h2z" opacity=".6"/>
          </svg>
        </button>
        <span class="tbtn-label">Control</span>
      </div>

      <div class="toolbar-item">
        <button class="tbtn" id="btn-chat" title="Abrir / Cerrar chat">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
          </svg>
          <span class="badge" id="chat-badge" style="display:none"></span>
        </button>
        <span class="tbtn-label">Chat</span>
      </div>

      <div class="toolbar-item">
        <button class="tbtn end-btn" id="btn-end" title="Salir de la llamada">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.1-.7-.28-.79-.73-1.68-1.36-2.66-1.85-.33-.16-.56-.51-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/>
          </svg>
        </button>
        <span class="tbtn-label end-label">Salir</span>
      </div>

    </div>
  </div>

  <!-- Invite Modal -->
  <div class="modal-overlay" id="invite-modal" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h3>Invitar a la reunión</h3>
        <button class="icon-btn" id="btn-close-modal">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
          </svg>
        </button>
      </div>
      <p class="modal-desc">Comparte este enlace para que otros puedan unirse:</p>
      <div class="link-row">
        <input id="invite-link" type="text" readonly />
        <button id="btn-copy-link">Copiar</button>
      </div>
      <p class="modal-note" id="copy-confirm" style="display:none">¡Enlace copiado!</p>
    </div>
  </div>

  <!-- Control Request Toast -->
  <div class="toast" id="control-toast" style="display:none">
    <div class="toast-text">
      <strong id="toast-requester"></strong> quiere controlar tu pantalla
    </div>
    <div class="toast-actions">
      <button id="btn-deny-control" class="toast-btn deny">Rechazar</button>
      <button id="btn-grant-control" class="toast-btn allow">Permitir</button>
    </div>
  </div>

  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
